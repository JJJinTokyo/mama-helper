<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mama helper</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e17;--surface:#1a1928;--card:#201f30;--card2:#272639;
  --accent:#f4a7c0;--accent2:#a78bfa;--accent3:#67e8f9;
  --text:#ede9ff;--dim:#8b89a8;
  --green:#6ee7b7;--yellow:#fcd34d;--red:#f87171;--orange:#fb923c;
  --border:rgba(255,255,255,0.07);
  --max:960px;--r:14px;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

/* ── Header / Nav ── */
.site-header{position:sticky;top:0;z-index:50;background:rgba(15,14,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.header-inner{max-width:var(--max);margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px}
.site-logo{font-size:17px;font-weight:700;white-space:nowrap;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
.site-nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex:1}
.site-nav::-webkit-scrollbar{display:none}
.nav-link{padding:7px 13px;border-radius:8px;font-size:14px;color:var(--dim);cursor:pointer;white-space:nowrap;border:none;background:none;transition:all .18s;font-family:inherit}
.nav-link:hover{color:var(--text);background:var(--card2)}
.nav-link.active{color:var(--accent);background:rgba(244,167,192,.1)}

/* ── Page Sections ── */
.section{display:none;max-width:var(--max);margin:0 auto;padding:36px 24px 64px}
.section.active{display:block}
.section-title{font-size:26px;font-weight:700;margin-bottom:6px}
.section-sub{font-size:15px;color:var(--dim);margin-bottom:32px}

/* ── Home ── */
.home-hero{background:linear-gradient(135deg,#1e1650 0%,#130f2e 100%);border:1px solid rgba(167,139,250,.2);border-radius:20px;padding:36px 32px;margin-bottom:32px;display:flex;align-items:center;gap:24px}
.hero-age{font-size:48px;font-weight:800;color:var(--accent2);line-height:1}
.hero-meta{font-size:15px;color:var(--dim);margin-top:8px}
.hero-badge{display:inline-block;background:rgba(244,167,192,.12);border:1px solid rgba(244,167,192,.25);color:var(--accent);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-top:12px}

.quick-title{font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
@media(max-width:600px){.quick-grid{grid-template-columns:1fr 1fr}}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;cursor:pointer;transition:all .2s}
.qcard:hover{background:var(--card2);border-color:var(--accent);transform:translateY(-2px)}
.qcard .qi{font-size:28px;margin-bottom:10px}
.qcard .qt{font-size:15px;font-weight:600}
.qcard .qs{font-size:13px;color:var(--dim);margin-top:4px}
.cry-quick{background:linear-gradient(135deg,rgba(244,107,160,.15),rgba(232,121,160,.08));border:1px solid rgba(244,167,192,.3);border-radius:var(--r);padding:22px 24px;margin-bottom:28px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.cry-quick:hover{background:linear-gradient(135deg,rgba(244,107,160,.22),rgba(232,121,160,.14))}
.cry-quick .cq-text h2{font-size:19px;font-weight:700;margin-bottom:4px}
.cry-quick .cq-text p{font-size:14px;color:var(--dim)}
.cry-quick .cq-arrow{font-size:24px;opacity:.6}

/* ── Cry Reference ── */
.cry-intro{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:28px;font-size:14px;color:var(--dim);line-height:1.7}
.cry-intro strong{color:var(--text)}

.cry-grid{display:grid;gap:16px}
.cry-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cry-card.urgent{background:linear-gradient(135deg,#2d1515,#1e0f0f);border-color:rgba(248,113,113,.35)}
.cry-card.full{grid-column:1 / -1}
.cry-card-head{padding:18px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.cry-card.urgent .cry-card-head{border-bottom-color:rgba(248,113,113,.2)}
.cry-icon{font-size:26px}
.cry-card-title{font-size:17px;font-weight:700}
.cry-card.urgent .cry-card-title{color:var(--red)}
.cry-card-body{padding:16px 20px;display:grid;gap:14px}
@media(min-width:640px){
  .cry-grid{grid-template-columns:1fr 1fr}
}

.signal-block{}
.signal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:8px}
.signal-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.signal-list li{font-size:14px;padding-left:18px;position:relative;line-height:1.5}
.signal-list li::before{content:'·';position:absolute;left:0;color:var(--accent);font-size:18px;line-height:1.2}
.cry-card.urgent .signal-list li::before{color:var(--red)}

.action-block{background:rgba(255,255,255,.03);border-radius:10px;padding:12px 14px}
.action-block .signal-label{color:var(--accent2)}
.action-block .signal-list li::before{color:var(--accent2)}

.cry-note{background:rgba(252,211,77,.06);border:1px solid rgba(252,211,77,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#fde68a;margin-top:4px}

/* ── Generic Card ── */
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:16px}
.sc h3{font-size:16px;font-weight:700;color:var(--accent2);margin-bottom:14px}
.sc h4{font-size:13px;font-weight:600;color:var(--dim);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.04em}
.sc.hl{background:linear-gradient(135deg,#152d1e,#0e1f14);border-color:rgba(110,231,183,.18)}
.sc.hl h3{color:var(--green)}
.sc.urgent-sc{background:linear-gradient(135deg,#2d1515,#1e0f0f);border-color:rgba(248,113,113,.28)}
.sc.urgent-sc h3{color:var(--red)}

/* ── Two-col layout ── */
.two-col{display:grid;gap:16px}
@media(min-width:640px){.two-col{grid-template-columns:1fr 1fr}}
.three-col{display:grid;gap:16px}
@media(min-width:640px){.three-col{grid-template-columns:1fr 1fr 1fr}}

/* ── Big stat ── */
.stat-box{text-align:center;padding:14px 8px}
.stat-num{font-size:34px;font-weight:800;color:var(--accent)}
.stat-unit{font-size:14px;color:var(--dim)}
.stat-range{font-size:12px;color:var(--dim);margin-top:3px}

/* ── Row ── */
.row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;gap:16px}
.row:last-child{border-bottom:none}
.row .lbl{color:var(--dim);flex-shrink:0}
.row .val{font-weight:600;text-align:right}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--border)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:340px}
.tbl th{background:var(--card2);padding:10px 8px;text-align:center;color:var(--dim);font-weight:600;font-size:12px;letter-spacing:.03em}
.tbl td{padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.cur td{background:rgba(244,167,192,.09);color:var(--accent);font-weight:700}

/* ── Alerts ── */
.alert{border-radius:10px;padding:13px 16px;margin-bottom:12px;font-size:14px;line-height:1.65}
.alert.red{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#fca5a5}
.alert.yellow{background:rgba(252,211,77,.07);border:1px solid rgba(252,211,77,.22);color:#fde68a}
.alert.green{background:rgba(110,231,183,.07);border:1px solid rgba(110,231,183,.18);color:#a7f3d0}
.alert.purple{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.22);color:#c4b5fd}
.alert-title{font-weight:700;margin-bottom:5px}

/* ── Vaccine ── */
.vax-list{display:flex;flex-direction:column;gap:10px}
.vax-item{display:flex;align-items:flex-start;gap:14px;padding:16px;border-radius:12px;border:1px solid var(--border);background:var(--card)}
.vax-item.done{opacity:.55}
.vax-item.curr{background:rgba(252,211,77,.07);border-color:rgba(252,211,77,.35)}
.vax-item.soon{border-color:rgba(167,139,250,.28)}
.vstatus{font-size:12px;font-weight:700;min-width:76px;text-align:center;padding:5px 8px;border-radius:7px;flex-shrink:0;margin-top:2px}
.vax-item.done .vstatus{background:rgba(110,231,183,.1);color:var(--green)}
.vax-item.curr .vstatus{background:rgba(252,211,77,.15);color:var(--yellow)}
.vax-item.soon .vstatus{background:rgba(167,139,250,.1);color:var(--accent2)}
.vax-item.future .vstatus{background:rgba(255,255,255,.04);color:var(--dim)}
.vinfo .vm{font-size:12px;color:var(--dim)}
.vinfo .vn{font-size:15px;font-weight:600;margin-top:2px;line-height:1.4}
.vinfo .vcue{font-size:12px;color:var(--yellow);margin-top:5px}

/* ── Schedule ── */
.sched-grid{display:grid;gap:8px}
.sched-row{display:grid;grid-template-columns:60px 1fr;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;align-items:baseline}
.sched-row:last-child{border-bottom:none}
.sched-time{color:var(--accent);font-weight:600;font-size:13px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.back-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 24px;background:rgba(15,14,23,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;justify-content:center;z-index:40;transition:opacity .2s}
.back-bar.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:480px;padding:32px 28px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:21px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:14px;color:var(--dim);margin-bottom:24px}
.fg{margin-bottom:22px}
.flabel{display:block;font-size:13px;font-weight:600;color:var(--dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.finput{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;font-size:15px;color:var(--text);font-family:inherit}
.finput:focus{outline:none;border-color:var(--accent)}
.radio-row{display:flex;gap:8px;flex-wrap:wrap}
.rbtn{flex:1;min-width:80px;text-align:center;padding:11px 8px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--dim);cursor:pointer;font-size:14px;transition:all .18s;user-select:none}
.rbtn:hover{border-color:var(--accent);color:var(--text)}
.rbtn.sel{border-color:var(--accent);background:rgba(244,167,192,.1);color:var(--accent);font-weight:600}
.save-btn{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#e879a0);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:opacity .18s}
.save-btn:hover{opacity:.9}
.err-msg{display:none;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px}

/* ── Footer ── */
.site-footer{border-top:1px solid var(--border);padding:32px 24px;text-align:center;color:var(--dim);font-size:13px;line-height:1.8}

/* ── Misc ── */
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag.pink{background:rgba(244,167,192,.12);color:var(--accent)}
.tag.purple{background:rgba(167,139,250,.12);color:var(--accent2)}
.source-note{font-size:12px;color:var(--dim);margin-top:12px}
.lang-btn{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s}
.lang-btn.sel{background:rgba(244,167,192,.15);border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<!-- ── Site Header ── -->
<header class="site-header">
  <div class="header-inner">
    <div class="site-logo">👶 mama helper</div>
    <nav class="site-nav">
      <button id="nl-home" class="nav-link active" onclick="showSection('home')">首页</button>
      <button id="nl-cry" class="nav-link" onclick="showSection('cry')">宝宝哭了</button>
      <button id="nl-feed" class="nav-link" onclick="showSection('feed')">喂奶量</button>
      <button id="nl-sleep" class="nav-link" onclick="showSection('sleep')">睡眠</button>
      <button id="nl-poop" class="nav-link" onclick="showSection('poop')">便便</button>
      <button id="nl-growth" class="nav-link" onclick="showSection('growth')">身高体重</button>
      <button id="nl-vaccine" class="nav-link" onclick="showSection('vaccine')">疫苗</button>
    </nav>
    <div style="display:flex;gap:3px;flex-shrink:0;margin-left:8px">
      <button onclick="switchLang('zh')" id="lb-zh" class="lang-btn sel">中</button>
      <button onclick="switchLang('ja')" id="lb-ja" class="lang-btn">日</button>
      <button onclick="switchLang('en')" id="lb-en" class="lang-btn">EN</button>
    </div>
  </div>
</header>

<!-- ── Home ── -->
<section id="sec-home" class="section active">
  <div id="home-hero"></div>
  <div id="home-quick"></div>
</section>

<!-- ── 宝宝哭了 ── -->
<section id="sec-cry" class="section">
  <h1 id="stitle-cry" class="section-title">😢 宝宝哭了</h1>
  <p id="ssub-cry" class="section-sub">以下是最常见的8种原因和对应信号，对照查看，找到最像的情况</p>
  <div id="cry-content"></div>
</section>

<!-- ── 喂奶量 ── -->
<section id="sec-feed" class="section">
  <h1 id="stitle-feed" class="section-title">🍼 喂奶量参考</h1>
  <p id="ssub-feed" class="section-sub">根据宝宝当前月龄自动显示</p>
  <div id="feed-content"></div>
</section>

<!-- ── 睡眠 ── -->
<section id="sec-sleep" class="section">
  <h1 id="stitle-sleep" class="section-title">😴 睡眠参考</h1>
  <p id="ssub-sleep" class="section-sub">各月龄睡眠规律与作息参考</p>
  <div id="sleep-content"></div>
</section>

<!-- ── 便便 ── -->
<section id="sec-poop" class="section">
  <h1 id="stitle-poop" class="section-title">💩 便便参考</h1>
  <p id="ssub-poop" class="section-sub">颜色、频次与警惕信号</p>
  <div id="poop-content"></div>
</section>

<!-- ── 生长 ── -->
<section id="sec-growth" class="section">
  <h1 id="stitle-growth" class="section-title">📏 身高体重参考</h1>
  <p id="ssub-growth" class="section-sub">体重、身长、头围参考范围</p>
  <div id="growth-content"></div>
</section>

<!-- ── 疫苗 ── -->
<section id="sec-vaccine" class="section">
  <h1 id="stitle-vaccine" class="section-title">💉 疫苗进度</h1>
  <div id="vaccine-content"></div>
</section>

<!-- ── Footer ── -->
<footer class="site-footer">
  <div style="max-width:var(--max);margin:0 auto">
    <p id="footer-txt">本站内容仅供参考，不构成医疗建议。如有疑问请咨询儿科医生。</p>
  </div>
</footer>
<div id="back-bar" class="back-bar hidden">
  <button id="back-btn" onclick="showSection('home')" style="background:var(--card2);border:1px solid var(--border);color:var(--dim);padding:9px 32px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s" onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--accent)'" onmouseout="this.style.color='var(--dim)';this.style.borderColor='var(--border)'">← 返回主页</button>
</div>

<!-- ── Settings Modal ── -->
<div id="settings-overlay" class="overlay hidden">
  <div class="modal">
    <div id="stg-title" class="modal-title">👶 宝宝基本信息</div>
    <div id="stg-sub" class="modal-sub">填写后所有内容自动匹配月龄</div>
    <div id="settings-err" class="err-msg"></div>
    <div class="fg">
      <label id="stg-bday" class="flabel">宝宝生日</label>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px">
        <select id="sel-year" class="finput" style="padding:12px 10px">
          <option value="">年份</option>
        </select>
        <select id="sel-month" class="finput" style="padding:12px 10px">
          <option value=""></option>
        </select>
        <select id="sel-day" class="finput" style="padding:12px 10px">
          <option value="">日</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label id="stg-gender" class="flabel">宝宝性别</label>
      <div class="radio-row">
        <div class="rbtn" id="rb-male" onclick="selectRadio('gender','male')">男宝宝 👦</div>
        <div class="rbtn" id="rb-female" onclick="selectRadio('gender','female')">女宝宝 👧</div>
      </div>
    </div>
    <div class="fg">
      <label id="stg-feed" class="flabel">喂养方式</label>
      <div class="radio-row">
        <div class="rbtn" id="rb-breast" onclick="selectRadio('feed','breast')">母乳</div>
        <div class="rbtn" id="rb-formula" onclick="selectRadio('feed','formula')">配方奶</div>
        <div class="rbtn" id="rb-mixed" onclick="selectRadio('feed','mixed')">混合喂养</div>
      </div>
    </div>
    <button id="stg-save" class="save-btn" onclick="saveSettings()">保存</button>
  </div>
</div>

function showSection(id) {
  SECTIONS.forEach(s => {
    document.getElementById('sec-'+s).classList.toggle('active', s===id);
  });
  document.querySelectorAll('.nav-link').forEach((el,i) => {
    el.classList.toggle('active', SECTIONS[i] === id);
  });
  window.scrollTo({top:0, behavior:'smooth'});
  const bar = document.getElementById('back-bar');
  if (bar) bar.classList.toggle('hidden', id === 'home');
}

function initDateSelects() {
  const yrSfx  = lang==='en'?''   :'年';
  const moSfx  = lang==='en'?''   :'月';
  const daySfx = lang==='en'?''   :'日';
  const moNames= lang==='en'
    ?['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
    :null;
  const phYear  = lang==='en'?'Year' :lang==='ja'?'年'  :'年';
  const phMonth = lang==='en'?'Month':lang==='ja'?'月'  :'月';
  const phDay   = lang==='en'?'Day'  :lang==='ja'?'日'  :'日';

  // --- Year ---
  const yearEl = document.getElementById('sel-year');
  const savedYear = yearEl.value;
  while (yearEl.options.length) yearEl.remove(0);
  const phY = document.createElement('option'); phY.value=''; phY.textContent=phYear; yearEl.appendChild(phY);
  const now = new Date();
  for (let y = now.getFullYear(); y >= now.getFullYear()-1; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + yrSfx; yearEl.appendChild(o);
  }
  if (savedYear) yearEl.value = savedYear;

  // --- Month ---
  const moEl = document.getElementById('sel-month');
  const savedMo = moEl.value;
  while (moEl.options.length) moEl.remove(0);
  const phM = document.createElement('option'); phM.value=''; phM.textContent=phMonth; moEl.appendChild(phM);
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = String(m).padStart(2,'0');
    o.textContent = moNames ? moNames[m-1] : m + moSfx;
    moEl.appendChild(o);
  }
  if (savedMo) moEl.value = savedMo;

  // --- Day ---
  const dayEl = document.getElementById('sel-day');
  const savedDay = dayEl.value;
  while (dayEl.options.length) dayEl.remove(0);
  const phD = document.createElement('option'); phD.value=''; phD.textContent=phDay; dayEl.appendChild(phD);
  for (let d = 1; d <= 31; d++) {
    const o = document.createElement('option');
    o.value = String(d).padStart(2,'0'); o.textContent = d + daySfx; dayEl.appendChild(o);
  }
  if (savedDay) dayEl.value = savedDay;
}

function openSettings() {
  initDateSelects();
  if (S.birthday) {
    const p = S.birthday.split('-');
    document.getElementById('sel-year').value  = p[0]||'';
    document.getElementById('sel-month').value = p[1]||'';
    document.getElementById('sel-day').value   = p[2]||'';
  }
  radios.gender = S.gender || 'male';
  radios.feed   = S.feed   || 'breast';
  setRadioUI('gender', radios.gender);
  setRadioUI('feed',   radios.feed);
  document.getElementById('settings-err').style.display = 'none';
  document.getElementById('settings-overlay').classList.remove('hidden');
}

function setRadioUI(group, val) {
  const ids = {male:'rb-male',female:'rb-female',breast:'rb-breast',formula:'rb-formula',mixed:'rb-mixed'};
  const groups = {gender:['male','female'], feed:['breast','formula','mixed']};
  groups[group].forEach(v => {
    const el = document.getElementById(ids[v]);
    if (el) el.classList.toggle('sel', v===val);
  });
}

function selectRadio(group, val) {
  radios[group] = val; setRadioUI(group, val);
}

function saveSettings() {
  const errEl = document.getElementById('settings-err');
  errEl.style.display = 'none';
  const y = document.getElementById('sel-year').value;
  const m = document.getElementById('sel-month').value;
  const d = document.getElementById('sel-day').value;
  if (!y || !m || !d) {
    errEl.textContent = t('stg_err');
    errEl.style.display = 'block'; return;
  }
  S = {birthday: y+'-'+m+'-'+d, gender: radios.gender||'male', feed: radios.feed||'breast'};
  localStorage.setItem('mama_settings', JSON.stringify(S));
  document.getElementById('settings-overlay').classList.add('hidden');
  try { renderHome(); } catch(e) { console.error(e); }
  try { renderFeed(); renderSleep(); renderPoop(); renderGrowth(); renderVaccine(); } catch(e) { console.error(e); }
}

// ══════════════════════════════════════════
// AGE CALCULATION
// ══════════════════════════════════════════
function getAge() {
  if (!S.birthday) return null;
  const birth = new Date(S.birthday), now = new Date();
  const diffMs = now - birth;
  if (diffMs < 0) return {days:-1, months:0, display:lang==='en'?'Date error':lang==='ja'?'日付エラー':'日期有误', mode:'err'};
  const diffDays = Math.floor(diffMs/86400000);
  let months = (now.getFullYear()-birth.getFullYear())*12 + (now.getMonth()-birth.getMonth());
  if (now.getDate() < birth.getDate()) months--;
  months = Math.max(0,months);
  let display, mode;
  if (diffDays<=7)       { display=lang==='en'?`Day ${diffDays+1}`:lang==='ja'?`生後${diffDays+1}日目`:`出生第 ${diffDays+1} 天`; mode='A'; }
  else if (diffDays<=30) { display=lang==='en'?`Day ${diffDays+1}`:lang==='ja'?`生後${diffDays+1}日目`:`出生第 ${diffDays+1} 天`; mode='B'; }
  else                   { display=lang==='en'?`${months} months`:lang==='ja'?`${months}ヶ月`:`${months} 个月`; mode='C'; }
  return {days:diffDays, months, display, mode};
}

function renderVaccine() {
  const age = getAge();
  const months = age ? age.months : 0;
  const data = VAX_DATA[vaxCountry];
  const meta = VAX_META[vaxCountry];
  const cLabel = c => t('vax_'+c+'_name');
  const feeLabel = lang==='zh'?meta.feeLabel:lang==='ja'?(vaxCountry==='cn'?'公費=無料，自費=有料':'公費=定期接種（無料），自費=任意接種（有料）'):(vaxCountry==='cn'?'Public=Free, Self-pay=Paid':'Public=Publicly funded, Self-pay=Out of pocket');

  const items = data.map(v => {
    let cls, label;
    if (v.m < months)         { cls='done';   label=t('vax_done'); }
    else if (v.m === months)  { cls='curr';   label=t('vax_curr'); }
    else if (v.m <= months+2) { cls='soon';   label=t('vax_soon'); }
    else                      { cls='future'; label=t('vax_future'); }
    const vmLabel = v.m===0?t('vax_age_birth'):v.m===60?t('vax_age_5y'):t('vax_age_mo')(v.m);
    const vaccines = v.list.map(vx => {
      const feeTag = vx.fee==='公费' ? t('vax_fee_public') : t('vax_fee_self');
      const feeStyle = vx.fee==='公费'?'background:rgba(110,231,183,.2);color:var(--green)':'background:rgba(252,211,77,.2);color:var(--yellow)';
      return `<span style="display:inline-flex;flex-direction:column;gap:2px;margin:3px 4px 3px 0;background:var(--card);border-radius:6px;padding:5px 8px;font-size:13px">
        <span style="display:flex;align-items:center;gap:4px">
          ${vx.name}
          <span style="font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;white-space:nowrap;${feeStyle}">${feeTag}</span>
        </span>
        ${vx.note?`<span style="font-size:10px;color:var(--dim)">${vx.note}</span>`:''}
      </span>`;
    }).join('');
    return `<div class="vax-item ${cls}">
      <div class="vstatus">${label}</div>
      <div class="vinfo">
        <div class="vm">${vmLabel}</div>
        <div style="margin-top:6px;line-height:1">${vaccines}</div>
        ${cls==='curr'?`<div class="vcue" style="margin-top:8px">${t('vax_book')}</div>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('vaccine-content').innerHTML = `
    <div class="sc">
      <div style="display:flex;gap:8px;margin-bottom:20px">
        ${['cn','jp','us'].map(c=>`
          <button onclick="vaxCountry='${c}';renderVaccine()"
            style="flex:1;padding:10px 8px;border-radius:10px;border:2px solid ${vaxCountry===c?'var(--accent)':'var(--border)'};background:${vaxCountry===c?'rgba(244,167,192,.1)':'var(--card2)'};color:${vaxCountry===c?'var(--accent)':'var(--dim)'};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s">
            ${VAX_META[c].flag} ${cLabel(c)}
          </button>`).join('')}
      </div>
      <h3>${t('vax_header')(meta.flag+' '+cLabel(vaxCountry), months)}</h3>
      <p style="font-size:12px;color:var(--dim);margin:6px 0 16px">${feeLabel}</p>
      <div class="vax-list">${items}</div>
      <p class="source-note" style="margin-top:12px">データ出典 / Source：${meta.src}</p>
    </div>
    <div class="alert yellow">
      <div class="alert-title">${t('vax_diff_title')}</div>
      ${t('vax_diff_body')}
    </div>
    ${vaxCountry==='jp'?`<div class="alert purple"><div class="alert-title">${t('vax_jp_more')}</div>${t('vax_jp_more_body')}</div>`:''}
    ${vaxCountry==='us'?`<div class="alert purple"><div class="alert-title">${t('vax_us_more')}</div>${t('vax_us_more_body')}</div>`:''}
    ${vaxCountry==='cn'?`<div class="alert purple"><div class="alert-title">${t('vax_cn_more')}</div>${t('vax_cn_more_body')}</div>`:''}
  `;
}

// CRY

function renderCry() {
  const intro = `<div class="cry-intro"><strong>${t('cry_intro_strong')}</strong>${t('cry_intro')}</div>`;
  const cards = CRY_CARDS_DATA.map(card => {
    const cardClass = ['cry-card', card.urgent?'urgent':'', card.full?'full':''].filter(Boolean).join(' ');
    let body = '';
    if (card.sub) {
      body += card.urgent
        ? `<p class="signal-label">${card.sub[lang]||card.sub.zh}</p>`
        : `<p style="font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:4px">${card.sub[lang]||card.sub.zh}</p>`;
    }
    if (card.items) body += `<ul class="signal-list">${card.items.map(i=>`<li>${i[lang]||i.zh}</li>`).join('')}</ul>`;
    if (card.sig)   body += `<div class="signal-block"><p class="signal-label">${card.sig_lbl[lang]||card.sig_lbl.zh}</p><ul class="signal-list">${card.sig.map(s=>`<li>${s[lang]||s.zh}</li>`).join('')}</ul></div>`;
    if (card.act)   body += `<div class="action-block"><p class="signal-label">${card.act_lbl[lang]||card.act_lbl.zh}</p><ul class="signal-list">${card.act.map(a=>`<li>${a[lang]||a.zh}</li>`).join('')}</ul></div>`;
    if (card.note)  body += `<div class="cry-note">${card.note[lang]||card.note.zh}</div>`;
    return `<div class="${cardClass}"><div class="cry-card-head"><span class="cry-icon">${card.icon}</span><span class="cry-card-title">${card.title[lang]||card.title.zh}</span></div><div class="cry-card-body">${body}</div></div>`;
  }).join('');
  document.getElementById('cry-content').innerHTML = intro + `<div class="cry-grid">${cards}</div>`;
}

function switchLang(l) {
  lang = l;
  ['zh','ja','en'].forEach(x => {
    const el = document.getElementById('lb-'+x);
    if (el) el.classList.toggle('sel', x===l);
  });
  updateStaticUI();
  renderHome(); renderCry(); renderFeed(); renderSleep(); renderPoop(); renderGrowth(); renderVaccine();
}

function updateStaticUI() {
  // Nav links
  ['home','cry','feed','sleep','poop','growth','vaccine'].forEach(k => {
    const el = document.getElementById('nl-'+k);
    if (el) el.textContent = t('nav_'+k);
  });
  // Section titles & subtitles
  ['cry','feed','sleep','poop','growth','vaccine'].forEach(k => {
    const ti = document.getElementById('stitle-'+k);
    const su = document.getElementById('ssub-'+k);
    if (ti) ti.textContent = t('stitle_'+k);
    if (su && t('ssub_'+k)) su.textContent = t('ssub_'+k);
  });
  // Settings modal labels
  const labels = {
    'stg-title':t('stg_title'), 'stg-sub':t('stg_sub'),
    'stg-bday':t('stg_bday'), 'stg-gender':t('stg_gender'), 'stg-feed':t('stg_feed_lbl'),
    'stg-save':t('stg_save'),
  };
  Object.entries(labels).forEach(([id,txt]) => { const el=document.getElementById(id); if(el) el.textContent=txt; });
  // Radio buttons
  const rbMap = {'rb-male':t('stg_boy'),'rb-female':t('stg_girl'),'rb-breast':t('stg_breast'),'rb-formula':t('stg_formula'),'rb-mixed':t('stg_mixed')};
  Object.entries(rbMap).forEach(([id,txt]) => { const el=document.getElementById(id); if(el) el.textContent=txt; });
  // Footer & back button
  const footer = document.getElementById('footer-txt'); if (footer) footer.textContent = t('footer');
  const back   = document.getElementById('back-btn');   if (back)   back.textContent   = t('back');
  // Re-generate date dropdowns (keeps saved values, updates labels)
  initDateSelects();
}

function init() {
  const saved = localStorage.getItem('mama_settings');
  if (saved) { try { S = JSON.parse(saved); } catch(e) {} }
  updateStaticUI();
  renderCry();
  if (S.birthday) {
    renderHome(); renderFeed(); renderSleep(); renderPoop(); renderGrowth(); renderVaccine();
  } else {
    renderHome(); renderPoop();
    openSettings();
  }
}

function r10(n) { return Math.round(n / 10) * 10; } // 四舍五入到整十

function calcByWeight() {
  const w   = parseFloat(document.getElementById('weight-input').value);
  const res = document.getElementById('weight-result');
  const ph  = document.getElementById('weight-placeholder');
  if (!w || w < 1 || w > 15) { res.style.display='none'; ph.style.display='block'; return; }

  // 每日总量：×150 为各国通用中位，范围 ×120–160，封顶 960ml（AAP上限）
  const total       = r10(Math.min(w * 150, 960));
  const lo          = r10(w * 120);
  const hi          = r10(Math.min(w * 160, 960));
  const cappedTotal = total;

  // 每次奶量 = 每日总量 ÷ 喂奶次数
  const onceMin = r10(cappedTotal / feedTimesMax);
  const onceMax = r10(cappedTotal / feedTimesMin);

  const rawTotal = w * 150;
  const perDay   = lang==='en'?'/ day' :lang==='ja'?'/ 日':'/ 天';
  const perFeed  = lang==='en'?'/ feed':lang==='ja'?'/ 回':'/ 次';
  const timesDay = lang==='en'?'×/day':lang==='ja'?'回/日':'次/天';
  const cappedLbl= lang==='en'?'960 ml (max)':lang==='ja'?'960 ml（上限）':'960 ml（封顶）';
  document.getElementById('wr-formula-total').textContent =
    `${w} kg × 150 ml = ${rawTotal > 960 ? cappedLbl : total + ' ml'}`;
  document.getElementById('wr-total').textContent = `${cappedTotal} ml ${perDay}`;
  document.getElementById('wr-range').textContent =
    `${t('feed_range')}${lo}–${hi} ml（×120 ～ ×160，${t('feed_upper')} 960ml）`;
  document.getElementById('wr-formula-once').textContent =
    `${cappedTotal} ml ÷ ${feedTimesMin}–${feedTimesMax} ${timesDay}`;
  document.getElementById('wr-once').textContent = `${onceMin}–${onceMax} ml ${perFeed}`;
  document.getElementById('wr-once-range').textContent =
    `${t('feed_cur_ref')}${feedTimesMin}–${feedTimesMax} ${t('feed_times_day2')}`;

  res.style.display = 'block';
  ph.style.display  = 'none';
}

init();
